{% extends "candidate/base.html" %}

{% block title %}Profile Complete{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm text-center">
        <div class="card-body py-5">
          <div class="mb-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
          </div>
          <h2 class="mb-3">Profile Completed Successfully!</h2>
          <p class="lead mb-4">Your profile is now 100% complete and visible to employers.</p>

          <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'candidate:dashboard' %}" class="btn btn-danger">
              <i class="bi bi-speedometer2"></i> Go to Dashboard
            </a>
            <a href="{% url 'candidate:profile' 'personal' %}" class="btn btn-outline-secondary">
              <i class="bi bi-pencil"></i> Edit Profile
            </a>
          
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
