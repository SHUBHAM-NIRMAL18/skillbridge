{% load bootstrap5 %}

{# One Project row. #}
<div class="card mb-3 formset-item" data-index="{{ index }}" data-prefix="{{ prefix }}">
  <div class="card-body">
    {{ f.non_field_errors }}
    <div class="row g-3">
      <div class="col-md-6">{% bootstrap_field f.title %}</div>
      <div class="col-md-6">{% bootstrap_field f.project_url %}</div>
      <div class="col-md-6">{% bootstrap_field f.start_date %}</div>
      <div class="col-md-6">{% bootstrap_field f.end_date %}</div>
      <div class="col-12">{% bootstrap_field f.technologies %}</div>
      <div class="col-12">{% bootstrap_field f.description %}</div>
    </div>

    <div class="d-flex justify-content-end mt-3">
      <button type="button"
              class="btn btn-outline-danger btn-sm js-remove-row"
              data-remove-prefix="{{ prefix }}">
        <i class="bi bi-trash"></i> Remove
      </button>
    </div>
  </div>
</div>
